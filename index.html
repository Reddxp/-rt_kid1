<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@rt_KiD NonChalant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
    overflow:hidden;
}

/* Animated Background */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle,#00ffff22 0%,transparent 25%),
    radial-gradient(circle,#ff00ff22 0%,transparent 25%);
    animation:moveBg 10s linear infinite;
}

@keyframes moveBg{
    0%{transform:translate(-10%,-10%);}
    50%{transform:translate(-20%,-15%);}
    100%{transform:translate(-10%,-10%);}
}

.container{
    position:relative;
    text-align:center;
    z-index:1;
}

h1{
    font-size:5rem;
    color: white;
    text-transform:uppercase;
    letter-spacing:5px;
    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff,
    0 0 40px #00ffff,
    0 0 80px #00ffff;
    animation:glow 2s infinite alternate;
}

h2{
    margin-top:20px;
    font-size:2rem;
    color:#ff00ff;
    text-shadow:
    0 0 5px #ff00ff,
    0 0 10px #ff00ff;
}

.line{
    width:250px;
    height:3px;
    background:#00ffff;
    margin:25px auto;
    box-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

p{
    color:white;
    opacity:0.8;
    font-size:1.1rem;
    letter-spacing:2px;
    margin-top: 200px;
    text-shadow: 
      0 0 10px #00ffff,
      0 0 15px #00ffff,
      0 0 20px #00ffff;

}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
    }
    to{
        text-shadow:
        0 0 20px #00ffff,
        0 0 40px #00ffff,
        0 0 80px #00ffff,
        0 0 120px #00ffff;
    }
}

.btn-main {
    background-color: #050505;
    min-height: 100vh;
    border: none;
    color: white;
    text-shadow: 
       0 0 10px #00ffff,
       0 0 20px #00ffff;
    font-size: 40px;
    border-radius: 20px;
    text-decoration: none;
    justify-content: center;
    align-items: center;
}

.btn-main:hover {
    color: red;
    text-shadow: 
      0 0 10px red,
      0 0 20px red;
}

.welcome {
    border: none;
    background-color: #050505;
    width: 350px;              /* Sets a custom width */
    border-radius: 50px;       /* Rounds the outer edges of the player */
    box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2); /* Adds a soft drop shadow */
    outline: none;             /* Removes the default browser focus ring */
    display: none;
}
</style>
</head>

<body>

<div class="container">
    <h1>@rt_KiD</h1>
    <div class="line"></div>
    <h2>NONCHALANT</h2>
    <a href="" class="btn-main">Enter</a>
    <p>@GHOST DESIGNS | 2026</p>
    <audio class="Welcome" src="blue" autoplay muted controls loop>blue</audio>
</div>

</body>
</html>
