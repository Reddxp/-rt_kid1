<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@rt_KiD Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#050505;
    overflow-x:hidden;
}

/* Animated Background */

body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    top:0;
    left:0;
    background:
    radial-gradient(circle,#00ffff22 0%,transparent 25%),
    radial-gradient(circle,#ff00ff22 0%,transparent 25%);
    animation:moveBg 10s linear infinite;
    z-index:-1;
}

@keyframes moveBg{
    0%{transform:translate(-10%,-10%);}
    50%{transform:translate(-20%,-15%);}
    100%{transform:translate(-10%,-10%);}
}

/* Landing Page */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

h1{
    font-size:5rem;
    color:white;
    text-transform:uppercase;
    letter-spacing:5px;
    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

.line{
    width:250px;
    height:3px;
    margin:20px auto;
    background:#00ffff;
    box-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff;
}

h2{
    color:#ff00ff;
    margin-bottom:40px;
    text-shadow:
    0 0 10px #ff00ff;
}

.enter-btn{
    display:inline-block;
    padding:15px 40px;
    color:white;
    text-decoration:none;
    border:2px solid #00ffff;
    border-radius:50px;
    font-size:1.3rem;
    transition:0.4s;
    box-shadow:
    0 0 10px #00ffff;
}

.enter-btn:hover{
    transform:scale(1.05);
    box-shadow:
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

/* Gallery */

.gallery{
    padding:100px 50px;
}

.gallery-title{
    text-align:center;
    color:white;
    font-size:3rem;
    margin-bottom:50px;
    text-shadow:
    0 0 10px #00ffff;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    overflow:hidden;
    border-radius:20px;
    border:1px solid #00ffff44;
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:
    0 0 20px #00ffff;
}

.card img{
    width:100%;
    height:100%;
    display:block;
}

/* Footer */

footer{
    text-align:center;
    color:white;
    padding:40px;
    opacity:0.7;
}

</style>
</head>
<body>

<!-- Background Music -->

<audio id="bgMusic" loop>
    <source src="Blue.mp3" type="audio/mpeg">
</audio>

<!-- Landing -->

<section class="hero">

<div>

<h1>@rt_KiD</h1>

<div class="line"></div>

<h2>NONCHALANT GALLERY</h2>

<a href="#gallery" class="enter-btn" onclick="playMusic()">
ENTER GALLERY
</a>

</div>

</section>

<!-- Gallery -->

<section id="gallery" class="gallery">

<h2 class="gallery-title">
PHOTO GALLERY
</h2>

<div class="grid">

<div class="card">
<img src="1.jpg">
</div>

<div class="card">
<img src="2.jpg">
</div>

<div class="card">
<img src="3.jpg">
</div>

<div class="card">
<img src="4.jpg">
</div>

<div class="card">
<img src="5.jpg">
</div>

<div class="card">
<img src="6.jpg">
</div>
    <div class="card">
        <img src="7.jpg">
    </div>

</div>

</section>

<footer>
© 2026 @GHOST DESIGNS
</footer>

<script>

function playMusic(){
    let music = document.getElementById("bgMusic");
    music.play();
}

</script>

</body>
</html>
